<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>Cat-In-Lattice — Problem</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  .slide {
    width: 1920px; height: 1080px;
    background: #0d1117;
    padding: 80px 100px;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #e6edf3; position: relative;
    display: flex; gap: 64px;
  }
  .slide-number {
    position: absolute; top: 48px; right: 64px;
    font-size: 18px; color: #484f58;
  }

  /* Left column — text */
  .left {
    flex: 0 0 640px;
    display: flex; flex-direction: column;
    justify-content: center;
  }
  h1 {
    font-size: 64px; font-weight: 800;
    color: #ff6b6b; margin-bottom: 40px;
  }
  .context {
    font-size: 28px; color: #8b949e;
    margin-bottom: 48px; line-height: 1.6;
    border-left: 4px solid #30363d;
    padding-left: 24px;
  }
  .pain-list {
    display: flex; flex-direction: column; gap: 28px;
  }
  .pain-item {
    display: flex; align-items: flex-start; gap: 20px;
  }
  .pain-item h3 {
    font-size: 26px; font-weight: 700;
    color: #ff6b6b; margin-bottom: 6px;
  }
  .pain-item p {
    font-size: 20px; color: #8b949e; line-height: 1.5;
  }
  .pain-icon {
    flex-shrink: 0; width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    background: rgba(255,107,107,0.08);
    border-radius: 12px;
  }

  /* Right column — illustration */
  .right {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
  }
  .right img {
    width: 100%; height: auto;
  }

  .frequency {
    position: absolute; bottom: 64px; left: 100px;
    font-size: 22px; color: #f0a040;
    display: flex; align-items: center; gap: 12px;
  }
  .frequency .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #f0a040; animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-number">02 / 06</div>

  <!-- Left: text -->
  <div class="left">
    <h1>Problem</h1>
    <p class="context">
      이제 IDE가 아닌 터미널로 AI agent를 통해 코딩한다.<br>
      화면을 쪼개 8개 세션을 동시에 orchestration하기도 한다.
    </p>
    <div class="pain-list">
      <div class="pain-item">
        <div class="pain-icon">👁️</div>
        <div>
          <h3>주의력 분산</h3>
          <p>8개 터미널 중 어디에 인간의 판단이 필요한지 알아차리기 어렵다.</p>
        </div>
      </div>
      <div class="pain-item">
        <div class="pain-icon">⏳</div>
        <div>
          <h3>잉여 시간 낭비</h3>
          <p>에이전트 대기 시간을 활용할 방법이 없다.</p>
        </div>
      </div>
      <div class="pain-item">
        <div class="pain-icon">🖥️</div>
        <div>
          <h3>삭막한 터미널</h3>
          <p>텍스트만 흘러가는 공간. 몰입감과 애착이 생기지 않는다.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: illustration — 8 terminals + overwhelmed developer -->
