<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260">
  <defs>
    <linearGradient id="bg-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d2a8ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0a040" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pulse">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="260" fill="#0d1117" rx="12"/>
  <rect width="760" height="260" fill="url(#bg-glow)" rx="12"/>

  <!-- Main dashboard panel -->
  <g transform="translate(180, 20)">
    <rect width="400" height="200" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="400" height="28" rx="10" fill="#1c2128"/>
    <rect x="0" y="14" width="400" height="14" fill="#1c2128"/>
    <circle cx="16" cy="14" r="4" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="30" cy="14" r="4" fill="#f0a040" opacity="0.7"/>
    <circle cx="44" cy="14" r="4" fill="#3fb950" opacity="0.7"/>
    <text x="200" y="18" text-anchor="middle" font-family="'Pretendard', monospace" font-size="11" fill="#484f58" letter-spacing="1">AGENT FLEET — 8 SESSIONS</text>

    <!-- 8 session mini-tiles (2 rows x 4 cols) -->
    <!-- Row 1 -->
    <g transform="translate(16, 40)">
      <!-- Session 1 — running -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#8b949e">S-01</text>
      <rect x="56" y="8" width="18" height="8" rx="3" fill="#3fb950" opacity="0.25"/>
      <text x="65" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">OK</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="52" height="4" rx="2" fill="#3fb950" opacity="0.6"/>
      <rect x="8" y="34" width="50" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="62" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="48" width="38" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#3fb950" opacity="0.5">78%</text>
    </g>

    <g transform="translate(108, 40)">
      <!-- Session 2 — running -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#8b949e">S-02</text>
      <rect x="56" y="8" width="18" height="8" rx="3" fill="#3fb950" opacity="0.25"/>
      <text x="65" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">OK</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="40" height="4" rx="2" fill="#3fb950" opacity="0.6"/>
      <rect x="8" y="34" width="55" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="30" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="48" width="48" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#3fb950" opacity="0.5">61%</text>
    </g>

    <g transform="translate(200, 40)">
      <!-- Session 3 — BLOCKED (needs human) -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#f0a040" stroke-width="1.5" stroke-opacity="0.6"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#f0a040">S-03</text>
      <rect x="42" y="8" width="32" height="8" rx="3" fill="#f0a040" opacity="0.25"/>
      <text x="58" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#f0a040">WAIT</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="44" height="4" rx="2" fill="#f0a040" opacity="0.6"/>
      <rect x="8" y="34" width="62" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="45" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="48" width="55" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#f0a040" opacity="0.7">67%</text>
      <!-- Pulsing alert indicator -->
      <circle cx="74" cy="60" r="4" fill="#f0a040" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="74" cy="60" r="2" fill="#f0a040" opacity="0.8"/>
    </g>

    <g transform="translate(292, 40)">
      <!-- Session 4 — running -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#8b949e">S-04</text>
      <rect x="56" y="8" width="18" height="8" rx="3" fill="#3fb950" opacity="0.25"/>
      <text x="65" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">OK</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="60" height="4" rx="2" fill="#3fb950" opacity="0.6"/>
      <rect x="8" y="34" width="40" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="58" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="48" width="50" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#3fb950" opacity="0.5">91%</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(16, 118)">
      <!-- Session 5 — running -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#8b949e">S-05</text>
      <rect x="56" y="8" width="18" height="8" rx="3" fill="#3fb950" opacity="0.25"/>
      <text x="65" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">OK</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="20" height="4" rx="2" fill="#3fb950" opacity="0.6"/>
      <rect x="8" y="34" width="48" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="60" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#3fb950" opacity="0.5">30%</text>
    </g>

    <g transform="translate(108, 118)">
      <!-- Session 6 — error -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#ff6b6b" stroke-width="1.5" stroke-opacity="0.6"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#ff6b6b">S-06</text>
      <rect x="42" y="8" width="32" height="8" rx="3" fill="#ff6b6b" opacity="0.25"/>
      <text x="58" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#ff6b6b">ERR</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="35" height="4" rx="2" fill="#ff6b6b" opacity="0.6"/>
      <rect x="8" y="34" width="60" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="42" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#ff6b6b" opacity="0.7">53%</text>
      <circle cx="74" cy="60" r="4" fill="#ff6b6b" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="74" cy="60" r="2" fill="#ff6b6b" opacity="0.8"/>
    </g>

    <g transform="translate(200, 118)">
      <!-- Session 7 — running -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#8b949e">S-07</text>
      <rect x="56" y="8" width="18" height="8" rx="3" fill="#3fb950" opacity="0.25"/>
      <text x="65" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">OK</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="56" height="4" rx="2" fill="#3fb950" opacity="0.6"/>
      <rect x="8" y="34" width="50" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="66" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#3fb950" opacity="0.5">85%</text>
    </g>

    <g transform="translate(292, 118)">
      <!-- Session 8 — running -->
      <rect width="82" height="68" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="8" y="16" font-family="monospace" font-size="9" fill="#8b949e">S-08</text>
      <rect x="56" y="8" width="18" height="8" rx="3" fill="#3fb950" opacity="0.25"/>
      <text x="65" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">OK</text>
      <rect x="8" y="24" width="66" height="4" rx="2" fill="#1c2128"/>
      <rect x="8" y="24" width="48" height="4" rx="2" fill="#3fb950" opacity="0.6"/>
      <rect x="8" y="34" width="58" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <rect x="8" y="41" width="36" height="3" rx="1" fill="#8b949e" opacity="0.15"/>
      <text x="8" y="62" font-family="monospace" font-size="8" fill="#3fb950" opacity="0.5">73%</text>
    </g>
  </g>

  <!-- Cat sitting on top of dashboard, watching sessions -->
  <g transform="translate(120, 10)" filter="url(#soft)">
    <!-- Cat body -->
    <ellipse cx="28" cy="44" rx="18" ry="12" fill="#d2a8ff" opacity="0.85"/>
    <!-- Cat head -->
    <circle cx="28" cy="26" r="13" fill="#d2a8ff" opacity="0.85"/>
    <!-- Ears -->
    <polygon points="18,18 14,4 24,14" fill="#d2a8ff" opacity="0.85"/>
    <polygon points="38,18 42,4 32,14" fill="#d2a8ff" opacity="0.85"/>
    <!-- Eyes — alert, watching -->
    <ellipse cx="23" cy="25" rx="3" ry="3.5" fill="#0d1117"/>
    <ellipse cx="33" cy="25" rx="3" ry="3.5" fill="#0d1117"/>
    <ellipse cx="24" cy="24.5" rx="1.2" ry="1.8" fill="#ffd700"/>
    <ellipse cx="34" cy="24.5" rx="1.2" ry="1.8" fill="#ffd700"/>
    <!-- Nose -->
    <ellipse cx="28" cy="29" rx="1.5" ry="1" fill="#c9a0e6"/>
    <!-- Tail wrapping -->
    <path d="M 46,42 Q 58,32 54,16" stroke="#d2a8ff" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Paw on dashboard edge -->
    <ellipse cx="16" cy="54" rx="5" ry="3" fill="#d2a8ff" opacity="0.8"/>
    <ellipse cx="40" cy="54" rx="5" ry="3" fill="#d2a8ff" opacity="0.8"/>
  </g>

  <!-- Alert speech bubble from cat pointing to S-03 -->
  <g transform="translate(60, 72)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#1c2128" stroke="#f0a040" stroke-width="1" opacity="0.9"/>
    <polygon points="100,10 112,18 100,18" fill="#1c2128" stroke="#f0a040" stroke-width="1" opacity="0.9"/>
    <text x="10" y="13" font-family="'Pretendard', sans-serif" font-size="8" fill="#f0a040">🔔 S-03 approval</text>
    <text x="10" y="24" font-family="'Pretendard', sans-serif" font-size="8" fill="#8b949e">기다리고 있어요!</text>
  </g>

  <!-- Notification lines connecting cat to blocked sessions -->
  <line x1="148" y1="54" x2="380" y2="60" stroke="#f0a040" stroke-width="1" stroke-dasharray="4 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="148" y1="54" x2="288" y2="138" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 3" opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- Caption -->
  <text x="380" y="248" text-anchor="middle" font-family="'Pretendard', sans-serif" font-size="14" fill="#484f58" letter-spacing="2">
    8개 세션, 하나의 관제탑
  </text>
</svg>