<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260">
  <defs>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0a040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d2a8ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#d2a8ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0a040" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="warmglow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background atmosphere -->
  <rect width="760" height="260" fill="#0d1117" rx="12"/>
  <rect width="760" height="260" fill="url(#glow1)" rx="12"/>

  <!-- Terminal window 1 (left) -->
  <g transform="translate(40, 40)">
    <rect width="180" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <rect width="180" height="24" rx="8" fill="#1c2128"/>
    <rect x="180" y="0" width="0" height="24" rx="0 8 0 0" fill="#1c2128"/>
    <circle cx="14" cy="12" r="4" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="28" cy="12" r="4" fill="#f0a040" opacity="0.7"/>
    <circle cx="42" cy="12" r="4" fill="#3fb950" opacity="0.7"/>
    <!-- Code lines -->
    <rect x="12" y="36" width="80" height="4" rx="2" fill="#58a6ff" opacity="0.3"/>
    <rect x="12" y="48" width="120" height="4" rx="2" fill="#8b949e" opacity="0.2"/>
    <rect x="12" y="60" width="60" height="4" rx="2" fill="#3fb950" opacity="0.25"/>
    <rect x="12" y="72" width="100" height="4" rx="2" fill="#8b949e" opacity="0.2"/>
    <rect x="12" y="84" width="45" height="4" rx="2" fill="#d2a8ff" opacity="0.3"/>
    <!-- Cat silhouette sitting on terminal -->
    <g transform="translate(130, -20)" filter="url(#softglow)">
      <!-- Cat body -->
      <ellipse cx="20" cy="32" rx="14" ry="10" fill="#f0a040" opacity="0.85"/>
      <!-- Cat head -->
      <circle cx="20" cy="18" r="10" fill="#f0a040" opacity="0.85"/>
      <!-- Ears -->
      <polygon points="12,12 10,2 17,9" fill="#f0a040" opacity="0.85"/>
      <polygon points="28,12 30,2 23,9" fill="#f0a040" opacity="0.85"/>
      <!-- Eyes -->
      <ellipse cx="16" cy="17" rx="2.5" ry="3" fill="#0d1117"/>
      <ellipse cx="24" cy="17" rx="2.5" ry="3" fill="#0d1117"/>
      <ellipse cx="16" cy="16.5" rx="1" ry="1.5" fill="#ffd700"/>
      <ellipse cx="24" cy="16.5" rx="1" ry="1.5" fill="#ffd700"/>
      <!-- Tail -->
      <path d="M 34,30 Q 46,20 42,8" stroke="#f0a040" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
    </g>
  </g>

  <!-- Terminal window 2 (center) -->
  <g transform="translate(290, 70)">
    <rect width="180" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <rect width="180" height="24" rx="8" fill="#1c2128"/>
    <circle cx="14" cy="12" r="4" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="28" cy="12" r="4" fill="#f0a040" opacity="0.7"/>
    <circle cx="42" cy="12" r="4" fill="#3fb950" opacity="0.7"/>
    <!-- Code lines -->
    <rect x="12" y="36" width="100" height="4" rx="2" fill="#d2a8ff" opacity="0.3"/>
    <rect x="12" y="48" width="70" height="4" rx="2" fill="#8b949e" opacity="0.2"/>
    <rect x="12" y="60" width="130" height="4" rx="2" fill="#58a6ff" opacity="0.25"/>
    <rect x="12" y="72" width="50" height="4" rx="2" fill="#8b949e" opacity="0.2"/>
    <rect x="12" y="84" width="90" height="4" rx="2" fill="#3fb950" opacity="0.3"/>
    <!-- Visiting cat (jumping/in motion) -->
    <g transform="translate(60, -28) rotate(-15)" filter="url(#softglow)">
      <ellipse cx="18" cy="28" rx="12" ry="8" fill="#d2a8ff" opacity="0.8"/>
      <circle cx="18" cy="16" r="8" fill="#d2a8ff" opacity="0.8"/>
      <polygon points="11,11 9,2 15,8" fill="#d2a8ff" opacity="0.8"/>
      <polygon points="25,11 27,2 21,8" fill="#d2a8ff" opacity="0.8"/>
      <ellipse cx="15" cy="15" rx="2" ry="2.5" fill="#0d1117"/>
      <ellipse cx="21" cy="15" rx="2" ry="2.5" fill="#0d1117"/>
      <ellipse cx="15" cy="14.5" rx="0.8" ry="1.2" fill="#c8e6ff"/>
      <ellipse cx="21" cy="14.5" rx="0.8" ry="1.2" fill="#c8e6ff"/>
      <!-- Legs stretched (in motion) -->
      <line x1="8" y1="32" x2="2" y2="40" stroke="#d2a8ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="28" y1="32" x2="34" y2="40" stroke="#d2a8ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <path d="M 30,26 Q 40,18 38,6" stroke="#d2a8ff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>

  <!-- Terminal window 3 (right) -->
  <g transform="translate(540, 30)">
    <rect width="180" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <rect width="180" height="24" rx="8" fill="#1c2128"/>
    <circle cx="14" cy="12" r="4" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="28" cy="12" r="4" fill="#f0a040" opacity="0.7"/>
    <circle cx="42" cy="12" r="4" fill="#3fb950" opacity="0.7"/>
    <!-- Code lines -->
    <rect x="12" y="36" width="60" height="4" rx="2" fill="#3fb950" opacity="0.3"/>
    <rect x="12" y="48" width="140" height="4" rx="2" fill="#8b949e" opacity="0.2"/>
    <rect x="12" y="60" width="90" height="4" rx="2" fill="#f0a040" opacity="0.25"/>
    <rect x="12" y="72" width="110" height="4" rx="2" fill="#8b949e" opacity="0.2"/>
    <rect x="12" y="84" width="70" height="4" rx="2" fill="#58a6ff" opacity="0.3"/>
    <!-- Cat sleeping on terminal -->
    <g transform="translate(110, -12)" filter="url(#softglow)">
      <ellipse cx="20" cy="22" rx="18" ry="9" fill="#3fb950" opacity="0.75"/>
      <circle cx="6" cy="18" r="7" fill="#3fb950" opacity="0.75"/>
      <polygon points="1,14 -2,5 5,11" fill="#3fb950" opacity="0.75"/>
      <polygon points="11,14 14,5 8,11" fill="#3fb950" opacity="0.75"/>
      <!-- Closed eyes (sleeping) -->
      <path d="M 3,17 Q 6,19 9,17" stroke="#0d1117" stroke-width="1.5" fill="none"/>
      <path d="M 34,18 Q 38,14 42,18" stroke="#3fb950" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
      <!-- Zzz -->
      <text x="40" y="8" font-size="10" fill="#3fb950" opacity="0.5" font-family="sans-serif" font-weight="700">z</text>
      <text x="48" y="2" font-size="8" fill="#3fb950" opacity="0.35" font-family="sans-serif" font-weight="700">z</text>
    </g>
  </g>

  <!-- Connection trails between terminals -->
  <!-- Trail 1: left cat to center terminal -->
  <path d="M 210,60 C 240,45 260,55 290,70" stroke="url(#trail)" stroke-width="2" fill="none" stroke-dasharray="6 4" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="30" to="0" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Trail 2: center to right -->
  <path d="M 470,100 C 500,80 520,60 540,65" stroke="url(#trail)" stroke-width="2" fill="none" stroke-dasharray="6 4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="30" to="0" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <!-- Trail 3: right back to left (arc) -->
  <path d="M 620,150 C 580,210 200,220 100,160" stroke="url(#trail)" stroke-width="1.5" fill="none" stroke-dasharray="4 6" opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="40" to="0" dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Sparkle particles -->
  <circle cx="250" cy="55" r="2" fill="#f0a040" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="85" r="1.5" fill="#d2a8ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="190" r="2" fill="#3fb950" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="180" r="1.5" fill="#58a6ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.05;0.4" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Caption -->
  <text x="380" y="245" text-anchor="middle" font-family="'Pretendard', sans-serif" font-size="14" fill="#484f58" letter-spacing="2">
    각자의 터미널, 서로의 고양이
  </text>
</svg>